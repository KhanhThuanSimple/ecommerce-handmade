# ============================================================
# SERVER
# ============================================================
server.port=8080

# ============================================================
# DATABASE (PostgreSQL) — sửa user/password/db cho máy bạn
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_handmade_dev
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# Không tự động tạo/sửa bảng — dùng script SQL thủ công
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# APP / CORS / FRONTEND
# ============================================================
app.frontend-url=http://localhost:3000
app.cors-allowed-origins=http://localhost:3000
app.server-port=8080

# ============================================================
# VNPAY SANDBOX — đăng ký tại https://sandbox.vnpayment.vn
# Cấu hình Return URL & IPN URL trùng khớp trên portal VNPay
# ============================================================
vnpay.tmn-code=3YVU8UO5
vnpay.hash-secret=DPY40HQ9Q8BA7GUMGZKCKYY7I9V3STA8
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=${app.frontend-url}/vnpay-return
vnpay.ipn-url=http://localhost:8080/api/vnpay/ipn
vnpay.version=2.1.0

# ============================================================
# THYMELEAF (không dùng template — tắt cảnh báo)
# ============================================================
spring.thymeleaf.check-template-location=false

# ============================================================
# LOG (giảm noise khi dev)
# ============================================================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.orm.jdbc.bind=INFO

# ============================================================
# LỖI API (dev)
# ============================================================
server.error.include-message=always
