# ===== DEFAULT ENV VARIABLES =====
FRONTEND_URL=https://cheerful-rejoicing-production-8efa.up.railway.app
BACKEND_URL=https://ecommerce-handmade-production.up.railway.app

# ===== SERVER =====
server.port=${PORT:8080}
server.address=0.0.0.0
server.error.include-message=always
server.error.include-binding-errors=always
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# ===== FRONTEND URL (CORS) - ĐÃ CẬP NHẬT DOMAIN THẬT =====
app.frontend-url=${FRONTEND_URL:https://cheerful-rejoicing-production-8efa.up.railway.app}
app.cors-allowed-origins[0]=${FRONTEND_URL:https://cheerful-rejoicing-production-8efa.up.railway.app}
app.cors-allowed-origins[1]=http://localhost:3000

# ===== BACKEND URL - ĐÃ CẬP NHẬT DOMAIN THẬT =====
app.backend-url=${BACKEND_URL:https://ecommerce-handmade-production.up.railway.app}

# ===== DATABASE (Supabase PostgreSQL) =====
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require}spring.datasource.username=${DB_USERNAME:postgres.cbvssydcnnymeralvjck}
spring.datasource.password=${DB_PASSWORD:cXlDHoh00WStMUkg}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== CONNECTION POOL =====
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=120000
spring.datasource.hikari.validation-timeout=10000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ===== JPA/HIBERNATE =====
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.open-in-view=false

# ===== VNPAY =====
vnpay.version=2.1.0
vnpay.command=pay
vnpay.curr-code=VND
vnpay.order-type=other
vnpay.locale=vn
vnpay.tmn-code=${VNPAY_TMN_CODE:HAFY0QN2}
vnpay.hash-secret=${VNPAY_HASH_SECRET:WFJUM4DTUZ03PV027MNNX0E9K2FCHQMX}
vnpay.hash-secret-token=${VNPAY_HASH_SECRET_TOKEN:WFJUM4DTUZ03PV027MNNX0E9K2FCHQMX}
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=${BACKEND_URL:https://ecommerce-handmade-production.up.railway.app}/api/payment/vnpay/return
vnpay.ipn-url=${BACKEND_URL:https://ecommerce-handmade-production.up.railway.app}/api/payment/vnpay/ipn

# ===== LOGGING =====
logging.level.org.springframework=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web=DEBUG
logging.level.com.handmade.handmade_api=DEBUG
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=OFF
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.cors=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===== JWT =====
jwt.secret=${JWT_SECRET:your_very_secure_secret_key_that_is_at_least_32_characters_long_123456}
jwt.expiration=86400000

# ===== GROQ AI =====
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.1-8b-instant
groq.temperature=0.7
groq.max-tokens=1000

# ===== CHATBOX =====
chat.allow-anonymous=false
chat.anonymous-session-timeout=30
chat.anonymous-session-prefix=ANON_
chat.max-context-messages=10
chat.faq-fallback-enabled=true
chat.config-cache-ttl=300

# ===== REDIS (Optional) =====
app.cache.type=simple
# spring.data.redis.host=${REDIS_HOST}
# spring.data.redis.port=${REDIS_PORT:6379}
# spring.data.redis.password=${REDIS_PASSWORD}
# spring.data.redis.timeout=2000

# ===== SPRING DOCUMENTATION =====
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# ===== MANAGEMENT/ACTUATOR =====
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.db.enabled=true

# ===== MULTIPART =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== JACKSON =====
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSZ
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# ===== TOMCAT =====
server.tomcat.max-threads=10
server.tomcat.min-spare-threads=5
server.tomcat.max-connections=100
server.tomcat.accept-count=50
server.tomcat.connection-timeout=120000

# ===== SESSION =====
server.servlet.session.timeout=30m
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=Lax
server.servlet.session.cookie.http-only=true

# ===== SECURITY =====
server.forward-headers-strategy=framework
