# ============================================
# PRODUCTION CONFIGURATION FOR RAILWAY
# ============================================

# ===== SERVER =====
server.port=${PORT:8080}

# ===== FRONTEND URL (CORS) =====
app.frontend-url=${FRONTEND_URL:https://your-frontend-domain.railway.app}
app.cors-allowed-origins=${FRONTEND_URL:https://your-frontend-domain.railway.app}

# ===== DATABASE (Supabase PostgreSQL) =====
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${DB_USERNAME:postgres.cbvssydcnnymeralvjck}
spring.datasource.password=${DB_PASSWORD:cXlDHoh00WStMUkg}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== CONNECTION POOL =====
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.validation-timeout=5000

# ===== JPA/HIBERNATE =====
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== VNPAY =====
vnpay.version=2.1.0
vnpay.command=pay
vnpay.curr-code=VND
vnpay.order-type=other
vnpay.locale=vn
vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET}
vnpay.hash-secret-token=${VNPAY_HASH_SECRET_TOKEN}
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=${BACKEND_URL}/api/payment/vnpay/return
vnpay.ipn-url=${BACKEND_URL}/api/payment/vnpay/ipn

# ===== LOGGING =====
logging.level.org.springframework.security=INFO
logging.level.com.handmade.handmade_api=INFO
logging.level.org.hibernate=WARN

# ===== JWT =====
jwt.secret=${JWT_SECRET}

# ===== GROQ AI =====
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.1-8b-instant
groq.temperature=0.7

# ===== CHATBOX =====
chat.allow-anonymous=false
chat.anonymous-session-timeout=30
chat.anonymous-session-prefix=ANON_
chat.max-context-messages=10
chat.faq-fallback-enabled=true
chat.config-cache-ttl=300

# ===== REDIS (Optional) =====
app.cache.type=simple
